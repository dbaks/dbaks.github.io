<figure class="highlight cpp"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br></pre></td><td class="code"><pre><span class="line">   <span class="comment">//调用单参数的构造函数</span></span><br><span class="line">Person91 p1 = <span class="number">20</span>;</span><br></pre></td></tr></table></figure>
<p>允许隐式构造函数 在对象作为函数参数时,和对象作为返回值时使用</p>
<figure class="highlight cpp"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br></pre></td><td class="code"><pre><span class="line"><span class="function"><span class="keyword">void</span> <span class="title">test1</span><span class="params">(Car car)</span></span>;</span><br><span class="line"><span class="function">Car <span class="title">test2</span><span class="params">()</span></span>;</span><br><span class="line"></span><br><span class="line"></span><br><span class="line"><span class="built_in">test1</span>(<span class="number">10</span>);</span><br><span class="line"><span class="function">Car <span class="title">test2</span><span class="params">()</span></span>&#123;</span><br><span class="line">    <span class="keyword">return</span> <span class="number">10</span>;</span><br><span class="line">&#125;</span><br></pre></td></tr></table></figure>

<p>两种方法</p>
<figure class="highlight cpp"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br></pre></td><td class="code"><pre><span class="line"><span class="comment">//1.</span></span><br><span class="line">Car car = <span class="number">10</span>;<span class="comment">//直接调用单参数的构造函数</span></span><br><span class="line"></span><br><span class="line"><span class="comment">//2.</span></span><br><span class="line">Car car;<span class="comment">//调用单参构造函数</span></span><br><span class="line">car = <span class="number">10</span>;<span class="comment">//先创建一个对象,然后调用拷贝构造</span></span><br></pre></td></tr></table></figure>



<ul>
<li>可以通过关键字   <em><strong>explicit(明确)</strong></em>  禁用隐式构造<figure class="highlight cpp"><table><tr><td class="gutter"><pre><span class="line">1</span><br></pre></td><td class="code"><pre><span class="line"><span class="function"><span class="keyword">explicit</span> <span class="title">Person</span><span class="params">()</span></span>&#123;&#125;<span class="comment">//构造函数,该构造函数被禁止隐式调用</span></span><br></pre></td></tr></table></figure>
<blockquote>
<p>ps: 我刚刚尝试的时候发现并不可以,然后发现是Vs反应太慢了</p>
</blockquote>
</li>
</ul>
